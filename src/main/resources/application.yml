spring:
  application:
    name: feed-intelligence

  # Banco de dados ? primary (escritas)
  datasource:
    primary:
      url: jdbc:postgresql://localhost:5432/feedintelligence
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver

    # Replica ? em dev aponta para o mesmo host
    # Em produçăo, troca a URL para a read replica
    replica:
      url: jdbc:postgresql://localhost:5432/feedintelligence
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway ? migrations automáticas na inicializaçăo
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

  # E-mail
  mail:
    host: smtp.resend.com
    port: 587
    username: resend
    password: ${RESEND_API_KEY:placeholder}

# Configuraçőes customizadas da aplicaçăo
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-chars-long}
    expiration-ms: 900000          # 15 minutos
    refresh-expiration-ms: 604800000  # 7 dias

  openai:
    api-key: ${OPENAI_API_KEY:placeholder}
    model: gpt-4o-mini

  gemini:
    api-key: ${GEMINI_API_KEY:placeholder}

  news-api:
    api-key: ${NEWS_API_KEY:placeholder}

  email:
    from: digest@feedintelligence.com

# Logs
logging:
  level:
    com.feedintelligence: DEBUG
    org.springframework.security: INFO